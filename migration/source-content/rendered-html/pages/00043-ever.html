<div class="wp-block-column is-layout-flow wp-block-column-is-layout-flow" style="flex-basis:66.66%">
<p>亀有教会は東京大司教区に所属していますが、コンベンツアル聖フランシスコ修道会委託小教区（教会）であり、支部修道院の一つである亀有修道院が併設されています。修道会総本部はイタリア・ローマ、日本管区本部は東京都練馬区関町。修道会のラテン語名称である Ordo Fratrum Minorum Conbentualium から、略称はOFMConv.</p>



<p>＞<a href="https://sekimachi-fh.org/index.html" target="_blank" rel="noreferrer noopener">コンベンツアル聖フランシスコ修道会</a> <i class="fas fa-external-link-alt" aria-hidden="true"></i></p>
