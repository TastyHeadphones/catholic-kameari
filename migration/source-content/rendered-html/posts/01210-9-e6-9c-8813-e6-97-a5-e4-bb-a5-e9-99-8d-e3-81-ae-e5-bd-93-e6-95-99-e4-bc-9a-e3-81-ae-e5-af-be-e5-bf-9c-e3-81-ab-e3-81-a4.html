<!-- title: 9月13日以降の当教会の対応について -->
<!-- date: 2021-09-13T15:36:47 -->
<!-- modified: 2023-12-04T17:56:05 -->
<div class="veu_autoEyeCatchBox"><img loading="lazy" decoding="async" width="512" height="512" src="https://catholic-kameari.jp/wp-content/uploads/2021/05/kameari-icon512×512.png" class="attachment-large size-large wp-post-image" alt="カトリック亀有教会アイコン" srcset="https://catholic-kameari.jp/wp-content/uploads/2021/05/kameari-icon512×512.png 512w, https://catholic-kameari.jp/wp-content/uploads/2021/05/kameari-icon512×512-300x300.png 300w, https://catholic-kameari.jp/wp-content/uploads/2021/05/kameari-icon512×512-150x150.png 150w" sizes="auto, (max-width: 512px) 100vw, 512px" /></div>
<p>政府の緊急事態宣言が9月30日まで延長となりました。それをうけまして東京教区より公開ミサの自粛を継続する旨の通達がございました。</p>



<!--more-->



<p>よって亀有教会も「ミサ公開中止」「教会・教会施設内立ち入り禁止」措置を継続いたします。 </p>



<p>期間：～9月30日（木）まで</p>



<p>上記の期間すべてのミサの公開を中止</p>



<p>※なお中止期間中は、教会施設内へも入ることが出来ませんのでご了承願います。その後の対応につきましては、再度お知らせいたします。皆様のご協力をお願いいたします。</p>
