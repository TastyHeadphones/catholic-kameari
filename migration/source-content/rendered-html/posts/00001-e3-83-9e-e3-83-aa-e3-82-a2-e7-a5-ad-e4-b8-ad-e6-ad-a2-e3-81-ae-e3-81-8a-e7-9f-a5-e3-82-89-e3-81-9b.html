<p>ご復活祭後新しい主任司祭をお迎えし、聖母月の5月を迎えようとしています。</p>



<!--more-->



<p>月報4月号では5月9日はマリア祭とご案内していましたが、当日は緊急事態宣言期間中になってしまいました。</p>



<p>本来であれば50周年のマリア祭で、これは来年以降に開催できるよう準備を進めますが、今年のマリア祭も緊急事態宣言期間中であることを鑑み昨年同様、行事としては中止と皆さまにお伝えすることが適当であると主任司祭と相談の上、決定させて頂きました。</p>



<p>5月9日はグループ②において感染防止に十分配慮し、復活節第六主日のミサを行うだけに留めます。</p>



<p>ご理解、ご協力賜りますようお願い申し上げます。</p>
