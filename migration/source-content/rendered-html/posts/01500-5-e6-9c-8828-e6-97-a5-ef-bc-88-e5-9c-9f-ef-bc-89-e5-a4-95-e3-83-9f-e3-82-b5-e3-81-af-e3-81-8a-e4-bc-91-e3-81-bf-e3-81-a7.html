<p>通常、土曜日は夕方18：30よりミサが行われますが、5月28日（土）はお休みとさせて頂きます。</p>



<!--more-->



<h2 class="is-style-vk-heading-default wp-block-heading"><span data-fontsize="23px" style="font-size: 23px;" class="vk_inline-font-size">5月28日（土）夕方のミサはお休みとなります</span></h2>



<p>5月29日（日）50周年記念ミサの準備のため、前日の5月28日（土）夕方のミサはお休みとさせて頂きます。<br><br>なお、<span data-color="#fffd6b" style="background: linear-gradient(transparent 60%,rgba(255, 253, 107, 0.7) 0);" class="vk_highlighter">5月28日（土）は10：00から大掃除と準備を行います</span>ので、69歳以下の健康な方は、ご協力のほどお願いいたします。</p>
