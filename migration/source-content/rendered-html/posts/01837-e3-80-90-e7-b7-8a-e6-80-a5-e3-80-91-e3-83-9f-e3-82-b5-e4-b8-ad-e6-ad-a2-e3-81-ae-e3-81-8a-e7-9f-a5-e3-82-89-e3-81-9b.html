<p>主任神父様がコロナ陽性のためミサが中止となります。</p>



<!--more-->



<h2 class="is-style-vk-heading-default wp-block-heading"><span data-fontsize="23px" style="font-size: 23px;" class="vk_inline-font-size">亀有教会信徒の皆様へ緊急のお知らせです</span></h2>



<p>亀有教会主任司祭のペトロ神父様がコロナ陽性になりました。</p>



<p>そのため本日1月14日（土）夕ミサはありません。</p>



<p>また明日の1月15日（日）から1月21日（土）朝ミサの間、全てのミサが中止となります。</p>



<p>上記の期間、教会への立ち入りも出来ませんので、ご理解のほどお願いいたします。</p>



<p>ペトロ神父様がお元気で回復いたしますよう、皆様のお祈りをお願い致します。<br></p>
