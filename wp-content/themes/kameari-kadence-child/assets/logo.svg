<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <!-- Latin cross atop the tower -->
  <rect x="29.4" y="4" width="1.4" height="9" fill="#a3823a"/>
  <rect x="26.5" y="6.6" width="7.2" height="1.4" fill="#a3823a"/>
  <!-- tall slim bell tower -->
  <rect x="26" y="13" width="8" height="38" fill="none" stroke="#2b3d2f" stroke-width="1.4"/>
  <!-- slit window near the top -->
  <rect x="28.5" y="18" width="3" height="3" fill="#2b3d2f"/>
  <!-- curved drum (worship space) on the right -->
  <path d="M 34 51 V 28 A 14 14 0 0 1 48 22 A 14 14 0 0 1 56 28 V 51" fill="none" stroke="#2b3d2f" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- three slim windows on the drum -->
  <rect x="40" y="34" width="1.2" height="13" fill="#2b3d2f"/>
  <rect x="45" y="34" width="1.2" height="13" fill="#2b3d2f"/>
  <rect x="50" y="34" width="1.2" height="13" fill="#2b3d2f"/>
  <!-- low rectangular wing on the left -->
  <rect x="8" y="36" width="18" height="15" fill="none" stroke="#2b3d2f" stroke-width="1.4"/>
  <!-- gold ground line -->
  <rect x="6" y="51.6" width="52" height="1.2" fill="#a3823a"/>
</svg>
